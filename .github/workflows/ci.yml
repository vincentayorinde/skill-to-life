name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f ROADMAP.md
          test -f CHANGELOG.md
          test -f AGENTS.md
