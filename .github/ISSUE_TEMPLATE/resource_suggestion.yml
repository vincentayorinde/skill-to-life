name: Resource suggestion
description: Suggest a free or paid learning resource for a career path
title: 'resource: '
labels: ['resources']
body:
  - type: input
    id: title
    attributes:
      label: Resource title
      placeholder: 'e.g. freeCodeCamp Responsive Web Design'
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Resource URL
      placeholder: 'https://...'
    validations:
      required: true

  - type: dropdown
    id: cost
    attributes:
      label: Cost
      options:
        - Free
        - Paid
        - Freemium
        - Unknown
    validations:
      required: true

  - type: input
    id: career
    attributes:
      label: Relevant career path
      placeholder: 'e.g. Frontend Developer, Data Analyst'
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Level
      options:
        - Beginner
        - Intermediate
        - Advanced
        - All levels
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this be included?
      description: Explain why this resource is useful.
