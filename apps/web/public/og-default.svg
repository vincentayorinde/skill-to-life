<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070d1f"/>
      <stop offset="50%" stop-color="#150826"/>
      <stop offset="100%" stop-color="#0c1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo wordmark -->
  <text x="600" y="230" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="900" font-size="88" fill="white" letter-spacing="-2">NextSkill</text>

  <!-- Accent underline -->
  <rect x="440" y="252" width="320" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="400" font-size="30" fill="rgba(255,255,255,0.55)">
    Discover your next tech career skill
  </text>

  <!-- Assessment badge -->
  <rect x="450" y="380" width="300" height="52" rx="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="600" y="413" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="600" font-size="22" fill="rgba(255,255,255,0.7)">
    Free · 10 questions · 2 minutes
  </text>

  <!-- Domain watermark -->
  <text x="600" y="564" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="400" font-size="22" fill="rgba(255,255,255,0.2)" letter-spacing="4">
    nextskill.dev
  </text>
</svg>
